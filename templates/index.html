<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASC Dashboard — Badminton Courts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="wrapper">
      <!-- Header -->
      <header class="header">
        <div class="header-inner">
          <div class="header-text">
            <div class="header-badge">Shahaji Raje Bhosle Kreeda Sankul, Andheri</div>
            <h1>Badminton Court Availability</h1>
            <p class="subtitle">Live slot data &middot; Auto-refreshes every hour</p>
          </div>
          <div class="header-status" id="header-status">
            <div class="status-dot" id="status-dot"></div>
            <div class="status-text">
              <span id="status-label">Loading...</span>
              <span id="status-time" class="status-time"></span>
            </div>
          </div>
        </div>
      </header>

      <div class="container">
        <!-- Date Tabs for cached data -->
        <nav class="date-tabs" id="date-tabs"></nav>

        <!-- Cached Results Area -->
        <section class="results-section" id="cached-results">
          <div class="loading-skeleton" id="skeleton">
            <div class="skeleton-row"><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div></div>
            <div class="skeleton-row"><div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div></div>
            <div class="skeleton-row"><div class="skeleton-card"></div></div>
          </div>
          <div id="cached-grid" class="court-grid"></div>
        </section>

        <!-- Divider -->
        <div class="section-divider">
          <span class="divider-line"></span>
          <button class="divider-toggle" id="toggle-manual">
            <span>Custom Search</span>
            <svg id="toggle-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="divider-line"></span>
        </div>

        <!-- Manual Search (collapsed by default) -->
        <div id="manual-section" class="manual-section collapsed">
          <div class="filter-card">
            <div class="filter-group">
              <div class="date-input-wrapper">
                <label for="start">Start Date</label>
                <input type="date" id="start" />
              </div>
              <div class="date-input-wrapper">
                <label for="end">End Date</label>
                <input type="date" id="end" />
              </div>
              <button id="check" class="btn-primary">Search</button>
            </div>
          </div>

          <!-- Status/Loader -->
          <div id="loader" class="loader hidden">
            <div class="spinner"></div>
            <span>Checking availability…</span>
            <span id="elapsed" class="elapsed">0s</span>
          </div>

          <!-- Logs -->
          <details class="logs-details">
            <summary>Activity Log</summary>
            <pre id="logs"></pre>
          </details>

          <!-- Manual Results -->
          <div id="results"></div>
        </div>
      </div>

      <footer class="footer">
        <span>ASCDashboard &middot; Data scraped from <a href="https://reczone.mcgm.gov.in" target="_blank" rel="noopener">reczone.mcgm.gov.in</a></span>
      </footer>
    </div>

    <script src="/static/main.js"></script>
  </body>
</html>
